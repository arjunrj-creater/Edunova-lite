<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Result Analysis</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<div class="ra-container">

  <h2>Result Analysis</h2>

  <!-- CONTROLS -->
  <div class="ra-controls">
    <label>Semester</label>
    <select id="semSelect">
      <option value="">-- Select Semester --</option>
      <option value="1">Semester 1</option>
      <option value="2">Semester 2</option>
      <option value="3">Semester 3</option>
      <option value="4">Semester 4</option>
      <option value="5">Semester 5</option>
      <option value="6">Semester 6</option>
    </select>

    <label>Subject</label>
    <select id="subjectSelect">
      <option value="">-- Select Subject --</option>
    </select>

    <button id="loadBtn" class="primary-btn">
      Load Students
    </button>
  </div>

  <!-- STATS -->
  <div class="ra-stats">
    <div class="stat-box">
      <span>Total Present</span>
      <strong id="totalPresent">0</strong>
    </div>

    <div class="stat-box">
      <span>Total Passed</span>
      <strong id="totalPass">0</strong>
    </div>

    <div class="stat-box highlight">
      <span>Pass Percentage</span>
      <strong id="passPercentage">0%</strong>
    </div>
  </div>

  <!-- TABLE -->
  <h3>Student Result Verification</h3>

  <table class="ra-table">
    <thead>
      <tr>
        <th>Name</th>
        <th>Present</th>
        <th>Result</th>
      </tr>
    </thead>
    <tbody id="resultTableBody"></tbody>
  </table>

  <div class="ra-footer">
    <button class="primary-btn" onclick="calculateAnalysis()">
      Calculate Result Analysis
    </button>
  </div>

</div>

<script type="module" src="mentor_result_analysis.js"></script>

<!-- EMBEDDED CSS -->
<style>
  body {
    font-family: Arial, sans-serif;
    background: #f1f5f9;
    padding: 20px;
  }

  .ra-container {
    background: #fff;
    padding: 25px;
    border-radius: 14px;
    max-width: 1000px;
    margin: auto;
  }

  .ra-controls {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-bottom: 25px;
    flex-wrap: wrap;
  }

  .ra-controls select {
    padding: 8px 10px;
    border-radius: 6px;
    min-width: 180px;
  }

  .ra-stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 30px;
  }

  .stat-box {
    background: #f3f6fb;
    border-radius: 12px;
    padding: 18px;
    text-align: center;
  }

  .stat-box strong {
    font-size: 30px;
    display: block;
    margin-top: 6px;
  }

  .stat-box.highlight {
    background: #2563eb;
    color: #fff;
  }

  .ra-table {
    width: 100%;
    border-collapse: collapse;
  }

  .ra-table th {
    background: #f1f5f9;
    padding: 12px;
    text-align: left;
  }

  .ra-table td {
    padding: 10px;
    border-bottom: 1px solid #e5e7eb;
  }

  .ra-footer {
    margin-top: 20px;
    text-align: right;
  }

  .primary-btn {
    background: #2563eb;
    color: #fff;
    border: none;
    padding: 8px 18px;
    border-radius: 6px;
    cursor: pointer;
  }
</style>

</body>
</html>
