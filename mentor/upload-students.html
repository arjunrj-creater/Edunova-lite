<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Upload Students | Edunova</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="../css/dashboard.css">
  <link rel="icon" href="../images/logo.png">

  <!-- SheetJS -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <style>
    .hidden { display: none; }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      font-size: 14px;
    }

    th {
      background: #2563eb;
      color: white;
    }

    tr.error-row {
      background: #fee2e2;
    }

    button {
      padding: 8px 16px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
    }

    button.secondary {
      background: #e5e7eb;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
  </style>
</head>

<body style="background:transparent;">

<main class="container">

  <!-- UPLOAD -->
  <section class="card">
    <h3>Upload Student Details</h3>

    <input type="file" id="excelFile" accept=".xlsx,.xls,.csv" />

    <p class="hint">
      Excel must contain:<br>
      student_id, student_name, email, phone, parent_phone, seat_type, status
    </p>

    <button type="button" id="previewBtn">Preview</button>
  </section>

  <!-- PREVIEW -->
  <section class="card hidden" id="previewSection">
    <h3>Preview Student Data</h3>

    <div style="overflow:auto;">
      <table id="previewTable">
        <thead></thead>
        <tbody></tbody>
      </table>
    </div>

    <div style="margin-top:16px; display:flex; gap:12px;">
      <button id="confirmBtn">Confirm & Save</button>
      <button id="cancelBtn" class="secondary">Cancel</button>
    </div>
  </section>

  <!-- RESULT -->
  <section class="card hidden" id="resultSection">
    <h3>Upload Result</h3>
    <div id="resultTable"></div>
  </section>

</main>

<script type="module" src="upload-students.js"></script>
</body>
</html>
