<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Attendance Verification | Edunova – Mentor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="../css/dashboard.css" />
  <link rel="icon" href="../images/logo.png" />

  <style>
    body {
  margin: 0;
  background: transparent;
 }

 .main {
  padding: 0 !important;
  margin: 0 !important;
 }

 .form-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:16px;
  margin-bottom:20px;
 }
    .card { margin-top: 20px; }
    .controls {
      display:flex;
      gap:14px;
      margin-bottom:16px;
      flex-wrap:wrap;
      align-items:center;
    }
    select, input {
      padding:10px;
      border:1px solid #d1d5db;
      border-radius:6px;
      font-size:14px;
    }
    table { width:100%; border-collapse:collapse; }
    th, td {
      padding:12px;
      border-bottom:1px solid #e5e7eb;
      font-size:14px;
    }
    th { background:#f1f5f9; text-align:left; }

    .btn {
      padding:8px 16px;
      border:none;
      border-radius:8px;
      cursor:pointer;
      font-size:14px;
      font-weight:600;
    }
    .btn-search { background:#2563eb; color:white; }
    .btn-publish { background:#16a34a; color:white; }

    .alert {
      margin-bottom:14px;
      padding:10px 14px;
      border-radius:6px;
      display:none;
      font-size:14px;
    }
    .alert.show { display:block; }
    .alert-info { background:#e0f2fe; color:#075985; }
    .alert-success { background:#dcfce7; color:#166534; }
    .alert-danger { background:#fee2e2; color:#991b1b; }
  </style>
</head>

<body>
<!---Main-->
  <div class="main">
    <div class="card">
      <h3>Attendance Verification</h3>
      <p class="note">Verify and publish attendance uploaded by faculty</p>

      <div id="alert" class="alert"></div>

      <div class="controls">
        <select id="subjectFilter">
          <option value="">All Subjects</option>
        </select>

        <input id="studentSearch" placeholder="Enter Student ID" />

        <button class="btn btn-search" onclick="searchStudents()">Search</button>
        <button class="btn btn-publish" onclick="publishAll()">Publish All</button>
      </div>

      <table>
        <thead>
          <tr>
            <th>S.No</th>
            <th>Student ID</th>
            <th>Name</th>
            <th>Subject</th>
            <th>Attended</th>
            <th>%</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script type="module">
import { auth, db } from "../js/firebase.js";
import { onAuthStateChanged } from
  "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import {
  doc, getDoc,
  collection, getDocs,
  query, where,
  updateDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const tableBody = document.getElementById("tableBody");
const subjectFilter = document.getElementById("subjectFilter");
const searchInput = document.getElementById("studentSearch");
const alertBox = document.getElementById("alert");

let mentorUid = null;
let mentorClassId = null;
let attendanceDocs = [];
let subjectMap = {};

/* AUTH + CLASS */
onAuthStateChanged(auth, async user => {
  if (!user) return location.replace("../index.html");

  mentorUid = user.uid;
  const mentorSnap = await getDoc(doc(db, "mentors", mentorUid));

  if (!mentorSnap.exists() || !mentorSnap.data().classId) {
    showAlert("Class not assigned to mentor", "danger");
    return;
  }

  mentorClassId = mentorSnap.data().classId;
  await loadSubjects();
  loadAttendance();
});

/* SUBJECT NAMES */
async function loadSubjects() {
  subjectMap = {};
  const snap = await getDocs(collection(db, "subjects"));
  snap.forEach(d => {
    subjectMap[d.id] = d.data().subject_name || d.id;
  });
}

/* LOAD ATTENDANCE (ALL SUBJECTS OF CLASS) */
async function loadAttendance() {
  attendanceDocs = [];
  tableBody.innerHTML = "";
  subjectFilter.innerHTML = `<option value="">All Subjects</option>`;

  const q = query(
    collection(db, "attendance_records"),
    where("classId", "==", mentorClassId),
    where("published", "==", false)
  );

  const snap = await getDocs(q);
  const subjectSet = new Set();

  snap.forEach(d => {
    const data = d.data();
    attendanceDocs.push({ id: d.id, ...data });
    subjectSet.add(data.subjectId);
  });

  subjectSet.forEach(id => {
    const opt = document.createElement("option");
    opt.value = id;
    opt.textContent = subjectMap[id] || id;
    subjectFilter.appendChild(opt);
  });

  renderTable();
}

/* SEARCH */
window.searchStudents = () => renderTable();
subjectFilter.addEventListener("change", renderTable);

/* TABLE */
function renderTable() {
  tableBody.innerHTML = "";
  let i = 1;

  const subjectValue = subjectFilter.value;
  const searchValue = searchInput.value.trim().toLowerCase();

  attendanceDocs
    .filter(r => !subjectValue || r.subjectId === subjectValue)
    .forEach(record => {
      record.students.forEach(s => {
        if (searchValue && !s.studentId.toLowerCase().includes(searchValue)) return;

        tableBody.innerHTML += `
          <tr>
            <td>${i++}</td>
            <td>${s.studentId}</td>
            <td>${s.studentName}</td>
            <td>${subjectMap[record.subjectId]}</td>
            <td>${s.attended}/${record.totalClasses}</td>
            <td>${s.percentage}%</td>
            <td>
              <button class="btn btn-publish"
                onclick="publish('${record.id}')">Publish</button>
            </td>
          </tr>`;
      });
    });

  if (i === 1) {
    tableBody.innerHTML =
      `<tr><td colspan="7" style="text-align:center">No records found</td></tr>`;
  }
}

/* SINGLE PUBLISH */
window.publish = async id => {
  await updateDoc(doc(db, "attendance_records", id), {
    verifiedByMentor: true,
    published: true,
    publishedAt: serverTimestamp(),
    mentorUid
  });
  showAlert("Attendance published 🎉", "success");
  loadAttendance();
};

/* 🔥 PUBLISH ALL (SUBJECT-WISE) */
window.publishAll = async () => {
  const subjectValue = subjectFilter.value;
  if (!subjectValue)
    return showAlert("Select a subject to publish all", "danger");

  const records = attendanceDocs.filter(
    r => r.subjectId === subjectValue
  );

  if (records.length === 0)
    return showAlert("No records to publish", "info");

  for (const r of records) {
    await updateDoc(doc(db, "attendance_records", r.id), {
      verifiedByMentor: true,
      published: true,
      publishedAt: serverTimestamp(),
      mentorUid
    });
  }

  showAlert(
    `Published all attendance for ${subjectMap[subjectValue]}`,
    "success"
  );
  loadAttendance();
};

/* ALERT */
function showAlert(msg, type) {
  alertBox.textContent = msg;
  alertBox.className = `alert alert-${type} show`;
  setTimeout(() => alertBox.classList.remove("show"), 2500);
}
</script>

<script src="mentor.js"></script>
</body>
</html>
