<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mark Verification | Mentor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="../css/dashboard.css">
  <link rel="icon" href="../images/logo.png">
</head>
  <style>
body {
  margin: 0;
  background: transparent;
}

.main {
  padding: 0 !important;
  margin: 0 !important;
}

.form-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:16px;
  margin-bottom:20px;
}
  </style>

<body>
  <!-- MAIN -->
  <div class="main">
    <div class="card">
      <h3>Mark Verification</h3>
      <p>Verify and publish internal marks uploaded by faculty</p>

      <div id="alert" class="alert"></div>
            <div class="controls">
        <select id="subjectFilter">
          <option value="">All Subjects</option>
        </select>

        <input
          type="text"
          id="studentSearch"
          placeholder="Enter Student ID"
        />

        <button class="btn btn-search" onclick="searchStudents()">Search</button>
        <button class="btn btn-search" onclick="verifyAll()">Verify All</button>

      </div>

      <table>
        <thead>
          <tr>
            <th>Sl.No</th>
            <th>Student ID</th> 
            <th>Student</th>
            <th>Subject</th>
            <th>Marks</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="markList">
          <tr><td colspan="5">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<!-- ✅ IMPORTANT: NOT mentor.js -->
<script type="module" src="mark-verification.js"></script>
</body>
</html>
