<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Change Password</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="../css/dashboard.css">

  <style>
    .password-wrapper {
      position: relative;
    }
    .password-wrapper input {
      width: 100%;
      padding-right: 60px;
    }
    .password-wrapper .toggle {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 13px;
      color: #000000;
      user-select: none;
    }
  </style>
</head>

<body>

<div class="card" style="max-width:420px;">
  <h3>Change Password</h3>
  <p class="note">Use a strong password you can remember</p>

  <div id="alert" class="alert"></div>

  <div class="form-box">
    <label>New Password</label>
    <div class="password-wrapper">
      <input type="password" id="newPassword" placeholder="Enter new password">
      <span id="toggleNewPwd" class="toggle">Show</span>
    </div>
  </div>

  <div class="form-box">
    <label>Confirm Password</label>
    <div class="password-wrapper">
      <input type="password" id="confirmPassword" placeholder="Re-enter new password">
      <span id="toggleConfirmPwd" class="toggle">Show</span>
    </div>
  </div>

  <button class="primary-btn" onclick="changePassword()">
    Update Password
  </button>
</div>

<script type="module">
  import { attachPasswordToggle } from "../js/password-toggle.js";

  attachPasswordToggle({
    inputId: "newPassword",
    toggleId: "toggleNewPwd"
  });

  attachPasswordToggle({
    inputId: "confirmPassword",
    toggleId: "toggleConfirmPwd"
  });
</script>

<script type="module" src="change-password.js"></script>
</body>
</html>
