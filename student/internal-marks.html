<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Internal Marks | Edunova – Student</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="../css/dashboard.css">
<link rel="icon" href="../images/logo.png">

<style>
/* 🔒 iframe-safe overrides */
body {
  margin: 0;
  background: transparent;
}

.main {
  padding: 0 !important;
  margin: 0 !important;
}
.card-block{margin-bottom:25px;}
table{width:100%;border-collapse:collapse;margin-top:10px;}
th,td{padding:8px;border-bottom:1px solid #e5e7eb;}
th{background:#f1f5f9;}
.badge-approved{
  background:#dcfce7;
  color:#166534;
  padding:4px 10px;
  border-radius:12px;
  font-size:12px;
}
.total{
  font-weight:bold;
}
</style>
</head>

<body>



  <!-- MAIN -->
  <div class="main">
    <div class="card">
      <h3>Your Internal Marks</h3>
      <p class="note">Only mentor-approved marks are shown</p>

      <div id="marksContainer"></div>
    </div>
  </div>

</div>

<script type="module">
import { auth, db } from "../js/firebase.js";
import { onAuthStateChanged } from
  "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import {
  doc, getDoc,
  collection, query, where, getDocs
} from
  "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const container = document.getElementById("marksContainer");

onAuthStateChanged(auth, async (user) => {
  if (!user) return;

  /* =====================
     GET STUDENT PROFILE
  ===================== */
  const userSnap = await getDoc(doc(db, "users", user.uid));
  if (!userSnap.exists()) {
    container.innerHTML = "<p>User profile not found</p>";
    return;
  }

  const studentId = userSnap.data().studentId;
  if (!studentId) {
    container.innerHTML = "<p>Student ID not linked</p>";
    return;
  }

  /* =====================
     LOAD SUBJECT MAP
  ===================== */
  const subjectSnap = await getDocs(collection(db, "subjects"));
  const subjectMap = {};

  subjectSnap.forEach(docSnap => {
    const data = docSnap.data();
    subjectMap[docSnap.id] = data.subject_name || docSnap.id;
  });

  /* =====================
     QUERY PUBLISHED MARKS
  ===================== */
  const q = query(
    collection(db, "internal_marks"),
    where("published", "==", true)
  );

  const snap = await getDocs(q);

  if (snap.empty) {
    container.innerHTML = "<p>No internal marks published yet</p>";
    return;
  }

  let found = false;

  snap.forEach(docSnap => {
    const data = docSnap.data();
    const student = data.students?.find(s => s.studentId === studentId);

    if (student) {
      found = true;
      renderMarks(data, student, subjectMap);
    }
  });

  if (!found) {
    container.innerHTML = "<p>No marks available for you</p>";
  }
});


function renderMarks(data, s, subjectMap) {
  const subjectName = subjectMap[data.subjectId] ?? data.subjectId ?? "—";

  container.innerHTML += `
    <div class="card-block">
      <h4>
        Subject: ${subjectName}
        <span class="badge-approved">Published</span>
      </h4>

      <table>
        <thead>
          <tr>
            <th>Test 1</th>
            <th>Test 2</th>
            <th>Assignment</th>
            <th>Attendance</th>
            <th>Total</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>${s.test1 ?? "-"}</td>
            <td>${s.test2 ?? "-"}</td>
            <td>${s.assignment ?? "-"}</td>
            <td>${s.attendance ?? "-"}</td>
            <td class="total">${s.total ?? "-"}</td>
          </tr>
        </tbody>
      </table>
    </div>
  `;
}
</script>
