<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Dashboard | Edunova</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="../css/dashboard.css">
<link rel="icon" href="../images/logo.png">
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="brand">
    <img src="../images/logo.png" class="logo">
    <span>Edunova – Student</span>
  </div>
  <button class="logout-btn" id="logoutBtn">Logout</button>
</div>

<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <a class="active" data-page="students-summary.html">Dashboard</a>
    <a data-page="attendance.html">Attendance</a>
    <a data-page="internal-marks.html">Internal Marks</a>
    <a data-page="subject.html">Subjects</a>
    <a data-page="student_profile.html">Profile</a>
  </div>

  <!-- MAIN -->
  <div class="main">
    <iframe
      id="contentFrame"
      src="students-summary.html"
      style="width:100%; height:85vh; border:none;">
    </iframe>
  </div>

</div>

<script type="module" src="js/auth-check.js"></script>
<script type="module" src="js/student-dashboard.js"></script>

</body>
</html>
