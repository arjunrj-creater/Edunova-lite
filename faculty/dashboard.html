<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Faculty Dashboard | Edunova</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="../css/dashboard.css">
<link rel="icon" href="../images/logo.png">
</head>

<body>

<!-- ================= TOPBAR ================= -->
<div class="topbar">
  <button class="hamburger" onclick="toggleSidebar()">☰</button>

  <div class="brand">
    <img src="../images/logo.png" class="logo">
    <span>Edunova – Faculty</span>
  </div>

  <button class="logout-btn" id="logoutBtn">Logout</button>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<div class="layout">

  <!-- ================= SIDEBAR ================= -->
  <div class="sidebar" id="sidebar">

    <div class="sidebar-header">
      <img src="../images/logo.png">
      <span>Edunova</span>
    </div>

    <a class="active" data-target="homeCard">Dashboard</a>
    <a data-target="attendanceuploadcard">Attendance</a>
    <a data-target="marksCard">Internal Marks</a>
    <a data-target="studentdetailcard">Student Details</a>
    <a data-target="profileCard">Profile</a>
   

  </div>

  <!-- ================= MAIN ================= -->
  <div class="main">

    <!-- ===== HOME DASHBOARD ===== -->
    <div class="card" id="homeCard">
      <h3 id="welcomeTitle">Welcome 👋</h3>
      <p class="note">
        Manage your classes, attendance and internal marks from here.
      </p>

      <!-- QUICK STATS -->
      <div class="stats-container">
        <div class="stat-box">
          <h2 id="classCount">–</h2>
          <p>Classes</p>
        </div>

        <div class="stat-box">
          <h2 id="subjectCount">–</h2>
          <p>Subjects</p>
        </div>
      </div>

      <!-- QUICK ACTIONS -->
<div style="margin-top:20px; display:flex; gap:12px; flex-wrap:wrap;">
  <button class="primary-btn" onclick="openCard('studentdetailcard')">
    Student Details
  </button>

  <button class="secondary-btn" onclick="openCard('attendanceuploadcard')">
    Take Attendance
  </button>

  <button class="secondary-btn" onclick="openCard('marksCard')">
    Enter Marks
  </button>
</div>
    </div>

    <!-- ===== ATTENDANCE UPLOAD ===== -->
    <div class="card hidden" id="attendanceuploadcard">
      <iframe src="attendance-upload.html" style="width:100%;height:80vh;border:none;"></iframe>  
    </div>

    <!-- ===== MARKS UPLOAD ===== -->
    <div class="card hidden" id="marksCard">
      <iframe src="marks.html" style="width:100%;height:80vh;border:none;"></iframe>
    </div>

    <!-- ===== student-detalis ===== -->
    <div class ="card hidden" id="studentdetailcard">
      <iframe src="student-details.html" style="width:100%;height:80vh;border:none;"></iframe>
    </div>  

   <!-- ===== PROFILE (COMMON) ===== -->
    <div class="card hidden profile-page" id="profileCard">
      <iframe
        src="../common/profile.html"
        class="profile-iframe"
        style="width:100%;height:80vh;border:none;">
      </iframe>
    </div>

<!-- ================= AUTH + BASIC CHECK ================= -->
<script type="module">
import { auth, db } from "../js/firebase.js";
import { onAuthStateChanged, signOut } from
  "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { doc, getDoc } from
  "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    location.replace("/index.html");
    return;
  }

  try {
    const userSnap = await getDoc(doc(db, "users", user.uid));
    if (!userSnap.exists() || userSnap.data().role !== "faculty") {
      location.replace("/index.html");
      return;
    }

    if (userSnap.data().firstLogin === true) {
      location.replace("/faculty/set-password.html");
      return;
    }

    const facultySnap = await getDoc(doc(db, "faculties", user.uid));
    if (!facultySnap.exists() || facultySnap.data().profileCompleted !== true) {
      location.replace("/faculty/setup-teaching.html");
      return;
    }

    document.getElementById("welcomeTitle").innerText =
     ` Welcome, ${userSnap.data().name || "Faculty"} 👋`;

  } catch (err) {
    console.error(err);
    location.replace("/index.html");
  }
});

document.getElementById("logoutBtn").onclick = async () => {
  await signOut(auth);
  location.replace("/index.html");
};

</script>

<!-- ================= SIDEBAR SECTION SWITCH ================= -->
<script>
document.querySelectorAll(".sidebar a[data-target]").forEach(link => {
  link.addEventListener("click", (e) => {
    e.preventDefault(); // 🔥 THIS PREVENTS /faculty/profile.html

    const targetId = link.dataset.target;

    document.querySelectorAll(".main .card").forEach(card => {
      card.classList.add("hidden");
    });

    document.getElementById(targetId).classList.remove("hidden");

    // Active state
    document.querySelectorAll(".sidebar a").forEach(a => a.classList.remove("active"));
    link.classList.add("active");
  });
});
</script>
<script>
function openCard(targetId) {
  // Hide all cards
  document.querySelectorAll(".main .card").forEach(card => {
    card.classList.add("hidden");
  });

  // Show target card
  document.getElementById(targetId).classList.remove("hidden");

  // Update sidebar active state
  document.querySelectorAll(".sidebar a").forEach(a => {
    a.classList.remove("active");
  });

  const sidebarLink = document.querySelector(`.sidebar a[data-target="${targetId}"]`);
  if (sidebarLink) sidebarLink.classList.add("active");

  // Close sidebar on mobile
  closeSidebar?.();
}
</script>


<!-- ================= FACULTY LOGIC ================= -->
<script type="module" src="js/faculty-dashboard.js"></script>

</body>
</html>
