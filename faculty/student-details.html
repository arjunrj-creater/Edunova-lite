<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Students List | Edunova</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="../css/dashboard.css">

<style>
/* 🔒 iframe-safe reset */
body {
  margin: 0;
  background: transparent;
}

.main {
  padding: 0 !important;
  margin: 0  !important;
}

/* CONTENT CARD */
.container {
  max-width: 1000px;
  background: #fff;
  border-radius: 10px;
  padding: 25px;
  margin: 0 auto; /* 🔥 CENTER FIX */
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

h2 {
  margin-top: 0;
  color: #1e293b;
}

.filters {
  display: flex;
  gap: 15px;
  margin-bottom: 20px;
}

select {
  padding: 8px;
  border-radius: 4px;
  border: 1px solid #cbd5e1;
  min-width: 200px;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 15px;
}

th, td {
  padding: 12px;
  border-bottom: 1px solid #e2e8f0;
  text-align: left;
}

th {
  background: #f1f5f9;
  font-size: 13px;
  color: #475569;
}

.loading {
  padding: 20px;
  color: #64748b;
}

.error {
  background: #fee2e2;
  color: #991b1b;
  padding: 12px;
  border-radius: 6px;
  margin-top: 15px;
}

.count {
  margin-top: 10px;
  font-size: 14px;
  color: #475569;
}
</style>
</head>

<body>

<div class="main">
  <div class="container">
    <h2>Students List</h2>

    <!-- Filters -->
    <div class="filters">
      <select id="classSelect">
        <option value="">Select Class</option>
      </select>

      <select id="subjectSelect" disabled>
        <option value="">Select Subject</option>
      </select>
    </div>

    <div id="loading" class="loading">Select class and subject</div>
    <div id="error" class="error" style="display:none;"></div>

    <table id="studentsTable" style="display:none;">
      <thead>
        <tr>
          <th>#</th>
          <th>Student ID</th>
          <th>Student Name</th>
          <th>Phone</th>
          </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>

    <div class="count" id="count"></div>
  </div>
</div>

<script type="module">
  import { auth, db } from "../js/firebase.js";
  import { onAuthStateChanged, signOut } from
    "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import {
    doc, getDoc, getDocs, collection
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const classSelect = document.getElementById("classSelect");
  const subjectSelect = document.getElementById("subjectSelect");
  const table = document.getElementById("studentsTable");
  const tableBody = document.getElementById("tableBody");
  const loading = document.getElementById("loading");
  const error = document.getElementById("error");
  const count = document.getElementById("count");

  let assignments = [];
  let classMap = {};
  let subjectMap = {};

  onAuthStateChanged(auth, async (user) => {
    if (!user) return;

    const facultySnap = await getDoc(doc(db, "faculties", user.uid));
    assignments = facultySnap.data()?.assignments || [];

    const classSnap = await getDocs(collection(db, "classes"));
    classSnap.forEach(d => classMap[d.id] = d.data().name);

    const subjectSnap = await getDocs(collection(db, "subjects"));
    subjectSnap.forEach(d => subjectMap[d.id] = d.data().subject_name);

    populateClasses();
  });

  function populateClasses() {
    const unique = [...new Set(assignments.map(a => a.classId))];
    unique.forEach(cid => {
      const opt = document.createElement("option");
      opt.value = cid;
      opt.textContent = classMap[cid] || cid;
      classSelect.appendChild(opt);
    });
  }

  classSelect.addEventListener("change", () => {
    subjectSelect.innerHTML = `<option value="">Select Subject</option>`;
    subjectSelect.disabled = true;
    resetTable();

    const classId = classSelect.value;
    if (!classId) return;

    assignments
      .filter(a => a.classId === classId)
      .forEach(a => {
        const opt = document.createElement("option");
        opt.value = a.subjectId;
        opt.textContent = subjectMap[a.subjectId];
        subjectSelect.appendChild(opt);
      });

    subjectSelect.disabled = false;
  });

  subjectSelect.addEventListener("change", loadStudents);

  async function loadStudents() {
    resetTable();

    const classId = classSelect.value;
    const subjectId = subjectSelect.value;
    if (!classId || !subjectId) return;

    loading.innerText = "Loading students...";

    const snap = await getDocs(collection(db, "students"));
    let i = 1;

    snap.forEach(d => {
      const s = d.data();
      if (s.classId === classId) {
        tableBody.innerHTML += `
          <tr>
            <td>${i++}</td>
            <td>${s.student_id}</td>
            <td>${s.student_name}</td>
            <td>${s.phone || "-"}</td>
          </tr>
        `;
      }
    });

    if (i === 1) {
      showError("No students found");
      return;
    }

    loading.style.display = "none";
    table.style.display = "table";
    count.innerText = `Total Students: ${i - 1}`;
  }

  function resetTable() {
    table.style.display = "none";
    tableBody.innerHTML = "";
    count.innerText = "";
    loading.style.display = "block";
    error.style.display = "none";
  }

  function showError(msg) {
    loading.style.display = "none";
    error.style.display = "block";
    error.innerText = msg;
  }

  window.logout = async () => {
    await signOut(auth);
    window.location.href = "../index.html";
  };
</script>

</body>
</html>
