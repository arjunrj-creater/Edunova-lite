<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Internal Marks | Edunova – Faculty</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="../css/dashboard.css">

<style>
/* 🔒 iframe-safe overrides */
body {
  margin: 0;
  background: transparent;
}

.main {
  padding: 0 !important;
  margin: 0 !important;
}

/* SAME STYLE AS ATTENDANCE */
.form-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:16px;
  margin-bottom:20px;
}
.input-field{display:flex;flex-direction:column;}
.input-field label{font-size:13px;margin-bottom:6px;color:#555;}
.input-field select,
.input-field input{
  padding:10px;
  border:1px solid #d1d5db;
  border-radius:6px;
  font-size:14px;
}
.table-wrapper{overflow-x:auto;margin-top:10px;}
table{width:100%;border-collapse:collapse;}
th{background:#f1f5f9;padding:10px;border-bottom:2px solid #cbd5e1;}
td{padding:10px;border-bottom:1px solid #e2e8f0;}
td input{width:100%;padding:6px;}
.alert{padding:12px;border-radius:6px;margin-bottom:16px;display:none;}
.alert.show{display:block;}
.alert-success{background:#dcfce7;color:#166534;}
.alert-danger{background:#fee2e2;color:#991b1b;}
</style>
</head>

<body>

<div class="main">
  <div class="card">
    <h3>Upload Internal Marks</h3>
    <p class="note">Select your assigned class and subject</p>

    <div id="alert" class="alert"></div>

    <!-- CLASS / SUBJECT -->
    <div class="form-grid">
      <div class="input-field">
        <label>Class</label>
        <select id="classSelect">
          <option value="">Select Class</option>
        </select>
      </div>

      <div class="input-field">
        <label>Subject</label>
        <select id="subjectSelect" disabled>
          <option value="">Select Subject</option>
        </select>
      </div>

      <div class="input-field">
        <label>Maximum Internal Marks</label>
        <input type="number" id="maxMarks" min="1">
      </div>
    </div>

    <!-- TABLE -->
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>S.No</th>
            <th>Student ID</th>
            <th>Name</th>
            <th>Test 1</th>
            <th>Test 2</th>
            <th>Assignment</th>
            <th>Attendance</th>
            <th>Total</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

    <p class="note" id="rowCount">Total Rows: 0</p>

    <div style="margin-top:20px;display:flex;gap:12px;">
      <button class="primary-btn" onclick="submitMarks()">Submit Marks</button>
      <button class="danger-btn" onclick="location.reload()">Reset</button>
    </div>
  </div>
</div>

<!-- 🔥 MARKS LOGIC (UNCHANGED) -->
<script type="module" src="marks.js"></script>

</body>
</html>
