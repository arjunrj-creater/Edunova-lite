<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edunova | Academic Management Platform</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="top-bar">
    <div class="header-content">
      <img src="images/logo.png" alt="Edunova Logo" class="logo-img">
      <div>
        <div class="logo-text">Edunova</div>
        <div class="tagline">Academic Management Platform</div>
      </div>
    </div>
  </header>

  <!-- MAIN -->
  <div class="main-layout">

    <!-- LOGIN PANEL -->
    <div class="right-panel">
      <h3>🔐 Sign In</h3>

      <!-- ROLE (NOT FOR HOD) -->
<select id="role" required>
  <option value="" disabled selected>Select role</option>
  <option value="student">Student</option>
  <option value="mentor">Mentor</option>
  <option value="faculty">Faculty</option>
</select>





      <div class="form-group">
        <label>🆔 Username</label>
        <input
          type="text"
          id="username"
          placeholder="Student ID / Mentor ID / HOD Email"
        />
      </div>

      <!-- PASSWORD (ONLY AREA MODIFIED) -->
      <div class="form-group">
        <label>🔑 Password</label>
        <div style="position:relative;">
          <input
            type="password"
            id="password"
            placeholder="Enter password"
          />
          <span
            id="togglePwd"
            style="
              position:absolute;
              right:12px;
              top:50%;
              transform:translateY(-50%);
              cursor:pointer;
              font-size:13px;
              color:#2563eb;
              user-select:none;
            "
          >
            Show
          </span>
        </div>
      </div>

      <div class="auth-links">
        <a href="#" onclick="alert('Contact mentor or HOD to reset password')">
          Forgot password?
        </a>
      </div>

      <button id="loginBtn" onclick="handleLogin()">Login</button>
     

<p class="register-line">
   <a href="#" onclick="showRegister();return false;">Register now</a>

</p>


      <p id="loginStatus" class="login-status"></p>

      <p class="login-note">
        Access credentials are provided by the institution.
      </p>
    </div>
   
  <!-- PASSWORD VISIBILITY LOGIC (FIXED & STABLE) -->
<script>
  const pwdInput = document.getElementById("password");
  const toggleBtn = document.getElementById("togglePwd");

  let isVisible = false;
  let autoHideTimer = null;

  function hidePassword() {
    pwdInput.type = "password";
    toggleBtn.innerText = "Show";
    isVisible = false;
    clearTimeout(autoHideTimer);
  }

  function startAutoHideTimer() {
    clearTimeout(autoHideTimer);
    autoHideTimer = setTimeout(hidePassword, 10000); // 10 seconds
  }

  // Show / Hide button
  toggleBtn.addEventListener("click", () => {
    if (!isVisible) {
      pwdInput.type = "text";
      toggleBtn.innerText = "Hide";
      isVisible = true;
      startAutoHideTimer();
    } else {
      hidePassword();
    }
  });

  // 🔥 FINAL FIX: typing immediately hides password
  pwdInput.addEventListener("input", () => {
    if (isVisible) {
      hidePassword(); // instant hide on typing
    }
  });
  const params = new URLSearchParams(window.location.search);
const role = params.get("role");

if(role){
   console.log("Selected role:", role);

   // Example: auto-select dropdown
   const roleSelect = document.getElementById("role");
   if(roleSelect){
       roleSelect.value = role;
   }
}
// ===== HIDE CURRENTLY SELECTED ROLE FROM DROPDOWN =====
const roleDropdown = document.getElementById("role");

roleDropdown.addEventListener("mousedown", () => {
  const selectedValue = roleDropdown.value;

  Array.from(roleDropdown.options).forEach(option => {
    if (option.value === selectedValue && selectedValue !== "") {
      option.style.display = "none";   // hide selected role
    }
  });
});

roleDropdown.addEventListener("change", () => {
  Array.from(roleDropdown.options).forEach(option => {
    option.style.display = "block";    // restore all options
  });
});

roleDropdown.addEventListener("blur", () => {
  Array.from(roleDropdown.options).forEach(option => {
    option.style.display = "block";    // restore if user clicks outside
  });
});
// remove "Select role" once user chooses a real role
const roleBox = document.getElementById("role");

roleBox.addEventListener("change", function () {
    if (this.value !== "") {
        this.querySelector('option[value=""]').remove();
    }
});


</script>
  <script type="module" src="js/firebase.js"></script>
  <script type="module" src="js/login.js"></script>
</body>
<div id="registerModal" class="modal">
  <div class="modal-box">

      <h2>🚧 Registration Available Soon</h2>

      <p>
      Edunova Lite accounts are currently created by the institution.
      Self-registration will be enabled in a future update.
      </p>

      <button onclick="closeRegister()">OK</button>

  </div>
</div>

</html>
